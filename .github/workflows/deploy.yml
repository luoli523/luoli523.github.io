name: Deploy Hugo Site

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HUGO_VERSION: "0.158.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Auto-update announcements for new posts
        run: |
          NEW_POSTS=$(git diff --name-only --diff-filter=A HEAD~1 HEAD 2>/dev/null \
            | grep 'content/post/.*/index\.md' || true)

          if [ -z "$NEW_POSTS" ]; then
            echo "No new posts detected, skipping announcement update."
          else
            echo "New posts found: $NEW_POSTS"
            for POST in $NEW_POSTS; do
              python3 scripts/update_announcements.py "$POST"
            done
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/announcements.yaml
            git diff --cached --quiet || \
              git commit -m "auto: 新文章公告 [skip ci]" && git push
          fi

      - name: Setup Hugo
        run: |
          wget -q -O hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xf hugo.tar.gz
          sudo mv hugo /usr/local/bin/
          hugo version

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
